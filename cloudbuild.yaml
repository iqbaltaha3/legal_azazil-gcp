steps:

- name: 'gcr.io/cloud-builders/docker'
  args:
  - build
  - -t
  - asia-south1-docker.pkg.dev/azazil-legal-chatbot/azazil/azazil-backend:$COMMIT_SHA
  - .

- name: 'gcr.io/cloud-builders/docker'
  args:
  - push
  - asia-south1-docker.pkg.dev/azazil-legal-chatbot/azazil/azazil-backend:$COMMIT_SHA

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - run
  - deploy
  - azazil-backend
  - --image
  - asia-south1-docker.pkg.dev/azazil-legal-chatbot/azazil/azazil-backend:$COMMIT_SHA
  - --region
  - asia-south1
  - --platform
  - managed

images:

- asia-south1-docker.pkg.dev/azazil-legal-chatbot/azazil/azazil-backend:$COMMIT_SHA